<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CPer's 备用导航页</title>
    <style>
        /* 基础样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* 采用类似代码编辑器的深灰色 */
            background-color: #1e1e1e;
            color: #d4d4d4;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* 容器确保在特效层级之上 */
        .container {
            position: relative;
            z-index: 10;
            text-align: center;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 300;
            margin-bottom: 2.5rem;
            letter-spacing: 1px;
            color: #ffffff;
        }

        /* 极简风格按钮 */
        .nav-btn {
            display: inline-block;
            padding: 12px 35px;
            font-size: 1rem;
            color: #ffffff;
            text-decoration: none;
            border: 1px solid #444;
            background: #2d2d2d;
            border-radius: 4px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        .nav-btn:hover {
            background: #3e3e3e;
            border-color: #666;
            transform: translateY(-1px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.4);
        }

        /* 页脚 */
        footer {
            position: absolute;
            bottom: 20px;
            z-index: 10;
            font-size: 0.85rem;
            color: #666;
        }

        footer a {
            color: #888;
            text-decoration: none;
            transition: color 0.2s;
        }

        footer a:hover {
            color: #007acc; /* 类似编辑器的链接蓝色 */
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>CPer's 备用导航页</h1>
        <a href="https://www.510904.xyz/" class="nav-btn">跳转至主导航页</a>
    </div>

    <footer>
        <a href="https://beian.miit.gov.cn/" target="_blank">蜀ICP备2025160729号-2</a>
    </footer>
